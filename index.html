<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liga MTG · Clasificación</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Paleta D20 Jocs · Fondo blanco ─────────────────
       Púrpura brand del logo, contrastes WCAG AA
       --purple-900: #3b0764  texto sobre blanco  ≈14:1
       --purple-800: #5b21b6  secundario          ≈ 8:1
       --purple-700: #6d28d9  acento interactivo  ≈ 5:1
       --purple-200: #ddd6fe  bordes suaves
       --purple-50:  #faf5ff  superficies
    ─────────────────────────────────────────────── */

    body {
      background: #ffffff;
      color: #3b0764;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #ffffff;
      border-bottom: 3px solid #7c3aed;
      padding: 32px 24px 24px;
      text-align: center;
    }
    header .logo { margin-bottom: 12px; }
    header .logo img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      border-radius: 50%;
      background: #fff;
      padding: 8px;
      box-shadow: 0 0 0 3px #7c3aed, 0 4px 20px rgba(124,58,237,.2);
    }
    header h1 {
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      color: #3b0764;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    header p {
      color: #6d28d9;
      font-style: italic;
      margin-top: 6px;
      font-size: .9rem;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      justify-content: center;
      padding: 20px 16px 0;
      gap: 0;
    }
    .tab-btn {
      padding: 11px 28px;
      background: #ffffff;
      border: 1px solid #ddd6fe;
      color: #5b21b6;
      cursor: pointer;
      font-size: .95rem;
      font-family: 'Georgia', serif;
      transition: background .18s, color .18s, border-color .18s;
    }
    .tab-btn:first-child { border-radius: 8px 0 0 8px; }
    .tab-btn:last-child  { border-radius: 0 8px 8px 0; }
    .tab-btn.active {
      background: #5b21b6;
      border-color: #5b21b6;
      color: #ffffff;
    }
    .tab-btn:hover:not(.active) { background: #faf5ff; color: #3b0764; border-color: #a78bfa; }

    /* ── Content areas ── */
    .tab-content { display: none; padding: 24px 16px 48px; max-width: 1040px; margin: 0 auto; }
    .tab-content.active { display: block; }

    /* ── Round selector ── */
    .round-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .round-btn {
      padding: 7px 16px;
      background: #ffffff;
      border: 1px solid #ddd6fe;
      border-radius: 20px;
      color: #5b21b6;
      cursor: pointer;
      font-size: .85rem;
      font-family: 'Georgia', serif;
      transition: background .15s, color .15s, border-color .15s;
    }
    .round-btn.active  { background: #5b21b6; border-color: #5b21b6; color: #ffffff; }
    .round-btn.pending { opacity: .35; cursor: default; pointer-events: none; }
    .round-btn:hover:not(.active):not(.pending) { background: #faf5ff; border-color: #a78bfa; color: #3b0764; }

    /* ── Table card ── */
    .table-card {
      background: #ffffff;
      border: 1px solid #ddd6fe;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(109,40,217,.08);
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 420px; }

    thead th {
      background: #5b21b6;
      color: #ffffff;
      padding: 12px 14px;
      font-size: .78rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      text-align: center;
      border-bottom: none;
      white-space: nowrap;
    }
    thead th:first-child,
    thead th:nth-child(2) { text-align: left; }

    tbody td {
      padding: 10px 14px;
      text-align: center;
      border-bottom: 1px solid #f3f0ff;
      font-size: .92rem;
      color: #3b0764;
      white-space: nowrap;
    }
    tbody td:first-child  { text-align: center; width: 48px; }
    tbody td:nth-child(2) { text-align: left; font-weight: bold; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #faf5ff; }

    /* rank badges */
    .rank { font-weight: bold; font-size: 1rem; }
    .r1 { color: #b45309; }   /* amber-700  ≈ 5:1 sobre blanco */
    .r2 { color: #4b5563; }   /* gray-600   ≈ 7:1 */
    .r3 { color: #92400e; }   /* amber-800  ≈ 7:1 */

    /* point coloring */
    .pts-zero  { color: #c4b5fd; }   /* violet-300 — decorativo, celdas vacías */
    .pts-pos   { color: #16a34a; }   /* green-600  ≈ 5:1 sobre blanco */
    .pts-null  { color: #ede9fe; }   /* violet-100 — casi invisible */
    .pts-total { color: #5b21b6; font-weight: bold; font-size: 1rem; } /* purple-800 ≈ 8:1 */

    /* ── Meta ── */
    .meta {
      text-align: right;
      color: #7c3aed;
      font-size: .75rem;
      margin-top: 10px;
      font-style: italic;
    }

    /* ── States ── */
    .state {
      text-align: center;
      padding: 56px 24px;
      color: #6d28d9;
      font-style: italic;
    }
    .state.error { color: #b91c1c; }
    .state small { display: block; margin-top: 8px; font-size: .8rem; opacity: .7; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .tab-btn { padding: 9px 16px; font-size: .85rem; }
      thead th, tbody td { padding: 9px 8px; font-size: .82rem; }
    }
    @media (max-width: 480px) {
      table { min-width: 0; }
      .round-col { display: none; }
      #tab-jornada .total-col { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><img src="logo.jpeg" alt="D20 Jocs" /></div>
  <h1>Liga Semanal MTG</h1>
  <p id="header-sub">Cargando temporada…</p>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="general">Clasificación General</button>
  <button class="tab-btn"        data-tab="jornada">Por Jornada</button>
</div>

<div id="tab-general" class="tab-content active">
  <div class="state" id="general-state">Cargando datos…</div>
</div>

<div id="tab-jornada" class="tab-content">
  <div class="round-selector" id="round-selector"></div>
  <div class="state" id="jornada-state">Cargando datos…</div>
</div>

<script>
  const SHEET_ID  = '1UHFDj0DEadAISqz1Y-k4qJza0nfgRhc9BXNBGBq_6F4';
  const MAX_ROUNDS = 10;
  let players = [], activeRounds = [], currentRound = 1;

  // ── Fetch & parse ────────────────────────────────────────────────────────

  async function loadData() {
    const url   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const res   = await fetch(url);
    const text  = await res.text();
    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)\s*;?\s*$/);
    if (!match) throw new Error('Respuesta inesperada de Google Sheets');
    return parseGviz(JSON.parse(match[1]));
  }

  function parseGviz(json) {
    const cols   = json.table.cols.map(c => c.label.trim());
    const iName  = cols.findIndex(l => /participante/i.test(l));
    const iTotal = cols.findIndex(l => /total/i.test(l));
    const iRounds = [];
    for (let r = 1; r <= MAX_ROUNDS; r++) {
      const idx = cols.findIndex(l => new RegExp(`jornada\\s*${r}$`, 'i').test(l));
      if (idx !== -1) iRounds.push(idx);
    }
    return json.table.rows.map(row => {
      const name = row.c[iName]?.v;
      if (!name || typeof name !== 'string') return null;
      const rounds = iRounds.map(i => {
        const v = row.c[i]?.v;
        return (v === null || v === undefined) ? null : Number(v);
      });
      const total = iTotal !== -1 ? Number(row.c[iTotal]?.v ?? 0) : 0;
      return { name, rounds, total };
    }).filter(Boolean);
  }

  function detectActiveRounds(data) {
    const active = [];
    for (let r = 0; r < MAX_ROUNDS; r++)
      if (data.some(p => p.rounds[r] !== null)) active.push(r + 1);
    return active;
  }

  // ── Render helpers ───────────────────────────────────────────────────────

  function rankLabel(i) {
    return i === 0 ? '<span class="rank r1">🥇</span>'
         : i === 1 ? '<span class="rank r2">🥈</span>'
         : i === 2 ? '<span class="rank r3">🥉</span>'
         : `<span style="color:#6040a0">${i + 1}</span>`;
  }

  // ── Render: Clasificación General ────────────────────────────────────────

  function renderGeneral() {
    const sorted = [...players].sort((a, b) => b.total - a.total);

    let html = `<div class="table-card"><table>
      <thead><tr>
        <th>#</th>
        <th>Jugador</th>
        ${activeRounds.map(r => `<th class="round-col">J${r}</th>`).join('')}
        <th>Total</th>
      </tr></thead>
      <tbody>`;

    sorted.forEach((p, i) => {
      const cells = activeRounds.map(r => {
        const v = p.rounds[r - 1];
        if (v === null) return `<td class="round-col pts-null">–</td>`;
        return `<td class="round-col ${v === 0 ? 'pts-zero' : 'pts-pos'}">${v}</td>`;
      }).join('');
      html += `<tr>
        <td>${rankLabel(i)}</td>
        <td>${p.name}</td>
        ${cells}
        <td class="pts-total">${p.total}</td>
      </tr>`;
    });

    html += `</tbody></table></div>
      <p class="meta">Actualizado: ${new Date().toLocaleString('es-ES')}</p>`;

    document.getElementById('general-state').outerHTML = html;
  }

  // ── Render: Por Jornada ──────────────────────────────────────────────────

  function renderRoundSelector() {
    const container = document.getElementById('round-selector');
    container.innerHTML = Array.from({ length: MAX_ROUNDS }, (_, i) => {
      const r = i + 1, isPending = !activeRounds.includes(r);
      const cls = isPending ? 'round-btn pending'
                : r === currentRound ? 'round-btn active'
                : 'round-btn';
      return `<button class="${cls}" data-round="${r}">Jornada ${r}</button>`;
    }).join('');

    container.querySelectorAll('.round-btn:not(.pending)').forEach(btn => {
      btn.addEventListener('click', () => {
        currentRound = Number(btn.dataset.round);
        renderRoundSelector();
        renderJornada();
      });
    });
  }

  function renderJornada() {
    const col    = currentRound - 1;
    const sorted = [...players]
      .filter(p => p.rounds[col] !== null)
      .sort((a, b) => b.rounds[col] - a.rounds[col]);

    const existing = document.querySelector('#tab-jornada .table-card')
                  ?? document.getElementById('jornada-state');

    if (!sorted.length) {
      existing.outerHTML = `<div class="state" id="jornada-state">Esta jornada aún no tiene resultados.</div>`;
      return;
    }

    let html = `<div class="table-card"><table>
      <thead><tr>
        <th>#</th>
        <th>Jugador</th>
        <th>Puntos J${currentRound}</th>
        <th class="total-col">Total acumulado</th>
      </tr></thead>
      <tbody>`;

    sorted.forEach((p, i) => {
      const v = p.rounds[col];
      html += `<tr>
        <td>${rankLabel(i)}</td>
        <td>${p.name}</td>
        <td class="${v === 0 ? 'pts-zero' : 'pts-pos'}">${v}</td>
        <td class="pts-total total-col">${p.total}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
    existing.outerHTML = html;
  }

  // ── Tabs ─────────────────────────────────────────────────────────────────

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.getElementById('tab-general').classList.toggle('active', tab === 'general');
      document.getElementById('tab-jornada').classList.toggle('active', tab === 'jornada');
    });
  });

  // ── Init ─────────────────────────────────────────────────────────────────

  (async () => {
    try {
      players      = await loadData();
      activeRounds = detectActiveRounds(players);
      currentRound = activeRounds.at(-1) ?? 1;

      document.getElementById('header-sub').textContent =
        `${activeRounds.length} de ${MAX_ROUNDS} jornadas disputadas · ${players.length} participantes`;

      renderGeneral();
      renderRoundSelector();
      renderJornada();
    } catch (err) {
      const msg = `<div class="state error">No se han podido cargar los datos.
        <small>Asegúrate de que la hoja de cálculo está configurada como pública.<br>${err.message}</small>
      </div>`;
      document.getElementById('general-state').outerHTML = msg;
      document.getElementById('jornada-state').outerHTML  = msg;
      console.error(err);
    }
  })();
</script>
</body>
</html>
