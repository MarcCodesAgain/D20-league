<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liga MTG · Clasificación</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b0b18;
      color: #ddd0b0;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(160deg, #1a0533 0%, #0d1a3a 60%, #0b0b18 100%);
      border-bottom: 2px solid #c9a84c;
      padding: 32px 24px 24px;
      text-align: center;
    }
    header .logo { font-size: 2rem; margin-bottom: 6px; }
    header h1 {
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      color: #c9a84c;
      text-shadow: 0 0 24px rgba(201,168,76,.45);
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    header p {
      color: #8888aa;
      font-style: italic;
      margin-top: 6px;
      font-size: .9rem;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      justify-content: center;
      padding: 20px 16px 0;
      gap: 0;
    }
    .tab-btn {
      padding: 11px 28px;
      background: #12122a;
      border: 1px solid #2e2e50;
      color: #7878a0;
      cursor: pointer;
      font-size: .95rem;
      font-family: 'Georgia', serif;
      transition: background .18s, color .18s, border-color .18s;
    }
    .tab-btn:first-child { border-radius: 8px 0 0 8px; }
    .tab-btn:last-child  { border-radius: 0 8px 8px 0; }
    .tab-btn.active {
      background: #1e0d42;
      border-color: #c9a84c;
      color: #c9a84c;
    }
    .tab-btn:hover:not(.active) { background: #1a1a35; color: #aaa0cc; }

    /* ── Content areas ── */
    .tab-content { display: none; padding: 24px 16px 48px; max-width: 1040px; margin: 0 auto; }
    .tab-content.active { display: block; }

    /* ── Round selector ── */
    .round-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .round-btn {
      padding: 7px 16px;
      background: #12122a;
      border: 1px solid #2e2e50;
      border-radius: 20px;
      color: #7878a0;
      cursor: pointer;
      font-size: .85rem;
      font-family: 'Georgia', serif;
      transition: background .15s, color .15s, border-color .15s;
    }
    .round-btn.active  { background: #1e0d42; border-color: #c9a84c; color: #c9a84c; }
    .round-btn.pending { opacity: .3; cursor: default; pointer-events: none; }
    .round-btn:hover:not(.active):not(.pending) { background: #1a1a35; color: #aaa0cc; }

    /* ── Table card ── */
    .table-card {
      background: #111126;
      border: 1px solid #252545;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 28px rgba(0,0,0,.6);
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 420px; }

    thead th {
      background: #160e30;
      color: #c9a84c;
      padding: 12px 14px;
      font-size: .78rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      text-align: center;
      border-bottom: 1px solid #c9a84c44;
      white-space: nowrap;
    }
    thead th:first-child,
    thead th:nth-child(2) { text-align: left; }

    tbody td {
      padding: 10px 14px;
      text-align: center;
      border-bottom: 1px solid #1a1a30;
      font-size: .92rem;
      white-space: nowrap;
    }
    tbody td:first-child  { text-align: center; width: 48px; }
    tbody td:nth-child(2) { text-align: left; font-weight: bold; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #191932; }

    /* rank badges */
    .rank { font-weight: bold; font-size: 1rem; }
    .r1 { color: #ffd700; }
    .r2 { color: #c0c0c0; }
    .r3 { color: #cd7f32; }

    /* point coloring */
    .pts-zero { color: #383858; }
    .pts-pos  { color: #7ecfa0; }
    .pts-null { color: #2a2a45; }
    .pts-total { color: #c9a84c; font-weight: bold; font-size: 1rem; }

    /* ── Meta ── */
    .meta {
      text-align: right;
      color: #444466;
      font-size: .75rem;
      margin-top: 10px;
      font-style: italic;
    }

    /* ── States ── */
    .state {
      text-align: center;
      padding: 56px 24px;
      color: #555575;
      font-style: italic;
    }
    .state.error { color: #d06060; }
    .state small { display: block; margin-top: 8px; font-size: .8rem; opacity: .7; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .tab-btn { padding: 9px 16px; font-size: .85rem; }
      thead th, tbody td { padding: 9px 8px; font-size: .82rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⚔️</div>
  <h1>Liga Semanal MTG</h1>
  <p id="header-sub">Cargando temporada…</p>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="general">Clasificación General</button>
  <button class="tab-btn"        data-tab="jornada">Por Jornada</button>
</div>

<div id="tab-general" class="tab-content active">
  <div class="state" id="general-state">Cargando datos…</div>
</div>

<div id="tab-jornada" class="tab-content">
  <div class="round-selector" id="round-selector"></div>
  <div class="state" id="jornada-state">Cargando datos…</div>
</div>

<script>
  const SHEET_ID = '14L3QA2-5oLNgSf6_a3cEQSdmSamIZpMYOfMBW9Yc6m0';
  const MAX_ROUNDS = 10;
  let players = [];
  let activeRounds = [];
  let currentRound = 1;

  // ── Fetch & parse ─────────────────────────────────────────────────────────

  async function loadData() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const res  = await fetch(url);
    const text = await res.text();
    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)\s*;?\s*$/);
    if (!match) throw new Error('Respuesta inesperada de Google Sheets');
    const json = JSON.parse(match[1]);
    return parseGviz(json);
  }

  function parseGviz(json) {
    const cols = json.table.cols.map(c => c.label.trim());
    // Find column indices dynamically
    const iName  = cols.findIndex(l => /participante/i.test(l));
    const iTotal = cols.findIndex(l => /total/i.test(l));
    const iRounds = [];
    for (let r = 1; r <= MAX_ROUNDS; r++) {
      const idx = cols.findIndex(l => new RegExp(`jornada\\s*${r}$`, 'i').test(l));
      if (idx !== -1) iRounds.push(idx);
    }

    return json.table.rows
      .map(row => {
        const name = row.c[iName]?.v;
        if (!name || typeof name !== 'string') return null;
        const rounds = iRounds.map(i => {
          const v = row.c[i]?.v;
          return v === null || v === undefined ? null : Number(v);
        });
        const total = iTotal !== -1 ? Number(row.c[iTotal]?.v ?? 0) : 0;
        return { name, rounds, total };
      })
      .filter(Boolean);
  }

  function detectActiveRounds(data) {
    const active = [];
    for (let r = 0; r < MAX_ROUNDS; r++) {
      if (data.some(p => p.rounds[r] !== null)) active.push(r + 1);
    }
    return active;
  }

  // ── Render: General ───────────────────────────────────────────────────────

  function renderGeneral() {
    const sorted = [...players].sort((a, b) => b.total - a.total);

    let html = `<div class="table-card"><table>
      <thead><tr>
        <th>#</th>
        <th>Jugador</th>
        ${activeRounds.map(r => `<th>J${r}</th>`).join('')}
        <th>Total</th>
      </tr></thead>
      <tbody>`;

    sorted.forEach((p, i) => {
      const rankLabel = i === 0 ? '<span class="rank r1">🥇</span>'
                      : i === 1 ? '<span class="rank r2">🥈</span>'
                      : i === 2 ? '<span class="rank r3">🥉</span>'
                      : `<span style="color:#444466">${i + 1}</span>`;

      const roundCells = activeRounds.map(r => {
        const v = p.rounds[r - 1];
        if (v === null) return `<td class="pts-null">–</td>`;
        return `<td class="${v === 0 ? 'pts-zero' : 'pts-pos'}">${v}</td>`;
      }).join('');

      html += `<tr>
        <td>${rankLabel}</td>
        <td>${p.name}</td>
        ${roundCells}
        <td class="pts-total">${p.total}</td>
      </tr>`;
    });

    html += `</tbody></table></div>
      <p class="meta">Actualizado: ${new Date().toLocaleString('es-ES')}</p>`;

    document.getElementById('general-state').outerHTML = html;
  }

  // ── Render: Por Jornada ───────────────────────────────────────────────────

  function renderRoundSelector() {
    const container = document.getElementById('round-selector');
    container.innerHTML = Array.from({ length: MAX_ROUNDS }, (_, i) => {
      const r = i + 1;
      const isPending = !activeRounds.includes(r);
      const cls = isPending ? 'round-btn pending' : r === currentRound ? 'round-btn active' : 'round-btn';
      return `<button class="${cls}" data-round="${r}">Jornada ${r}</button>`;
    }).join('');

    container.querySelectorAll('.round-btn:not(.pending)').forEach(btn => {
      btn.addEventListener('click', () => {
        currentRound = Number(btn.dataset.round);
        renderRoundSelector();
        renderJornada();
      });
    });
  }

  function renderJornada() {
    const col = currentRound - 1;
    const sorted = [...players]
      .filter(p => p.rounds[col] !== null)
      .sort((a, b) => b.rounds[col] - a.rounds[col]);

    const target = document.getElementById('jornada-state') ?? document.querySelector('#tab-jornada .state');

    if (!sorted.length) {
      const el = document.querySelector('#tab-jornada .table-card') ?? target;
      el.outerHTML = `<div class="state" id="jornada-state">Esta jornada aún no tiene resultados.</div>`;
      return;
    }

    let html = `<div class="table-card"><table>
      <thead><tr>
        <th>#</th>
        <th>Jugador</th>
        <th>Puntos Jornada ${currentRound}</th>
        <th>Total acumulado</th>
      </tr></thead>
      <tbody>`;

    sorted.forEach((p, i) => {
      const rankLabel = i === 0 ? '<span class="rank r1">🥇</span>'
                      : i === 1 ? '<span class="rank r2">🥈</span>'
                      : i === 2 ? '<span class="rank r3">🥉</span>'
                      : `<span style="color:#444466">${i + 1}</span>`;
      const v = p.rounds[col];
      html += `<tr>
        <td>${rankLabel}</td>
        <td>${p.name}</td>
        <td class="${v === 0 ? 'pts-zero' : 'pts-pos'}">${v}</td>
        <td class="pts-total">${p.total}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;

    const existing = document.querySelector('#tab-jornada .table-card') ?? document.getElementById('jornada-state');
    existing.outerHTML = html;
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.getElementById('tab-general').classList.toggle('active', tab === 'general');
      document.getElementById('tab-jornada').classList.toggle('active', tab === 'jornada');
    });
  });

  // ── Init ──────────────────────────────────────────────────────────────────

  (async () => {
    try {
      players      = await loadData();
      activeRounds = detectActiveRounds(players);
      currentRound = activeRounds.at(-1) ?? 1;

      document.getElementById('header-sub').textContent =
        `${activeRounds.length} de ${MAX_ROUNDS} jornadas disputadas · ${players.length} participantes`;

      renderGeneral();
      renderRoundSelector();
      renderJornada();
    } catch (err) {
      const msg = `<div class="state error">No se han podido cargar los datos.
        <small>Asegúrate de que la hoja de cálculo está configurada como pública.<br>${err.message}</small>
      </div>`;
      document.getElementById('general-state').outerHTML = msg;
      document.getElementById('jornada-state').outerHTML  = msg;
      console.error(err);
    }
  })();
</script>
</body>
</html>
